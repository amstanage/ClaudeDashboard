<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: dark navy to charcoal -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <!-- Amber bar gradient (bottom to top) -->
    <linearGradient id="barGrad1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="barGrad5" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Glow filter for bars -->
    <filter id="barGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Sparkle/asterisk glow -->
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle ambient glow behind bars -->
    <filter id="ambientGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip to rounded rect -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (very faint) -->
  <g clip-path="url(#roundedClip)" opacity="0.06">
    <line x1="162" y1="700" x2="862" y2="700" stroke="#D97706" stroke-width="1.5"/>
    <line x1="162" y1="580" x2="862" y2="580" stroke="#D97706" stroke-width="1.5"/>
    <line x1="162" y1="460" x2="862" y2="460" stroke="#D97706" stroke-width="1.5"/>
    <line x1="162" y1="340" x2="862" y2="340" stroke="#D97706" stroke-width="1.5"/>
  </g>

  <!-- Ambient glow blob behind bars -->
  <g clip-path="url(#roundedClip)" filter="url(#ambientGlow)" opacity="0.35">
    <rect x="280" y="300" width="460" height="400" rx="60" fill="#D97706"/>
  </g>

  <!-- Bar chart bars — 5 bars, bottom baseline y=720, bar width=80, gap=40 -->
  <!-- Layout: total width = 5*80 + 4*40 = 560. Center at 512 → start x = 512-280 = 232 -->
  <!-- Bar heights (from baseline going up): bar1=220, bar2=330, bar3=430 (tallest), bar4=280, bar5=180 -->

  <!-- Bar 1 (leftmost): x=232, height=220, top y=500 -->
  <rect x="232" y="500" width="80" height="220" rx="12" ry="12" fill="url(#barGrad1)" filter="url(#barGlow)" clip-path="url(#roundedClip)"/>

  <!-- Bar 2: x=352, height=330, top y=390 -->
  <rect x="352" y="390" width="80" height="330" rx="12" ry="12" fill="url(#barGrad2)" filter="url(#barGlow)" clip-path="url(#roundedClip)"/>

  <!-- Bar 3 (tallest): x=472, height=430, top y=290 -->
  <rect x="472" y="290" width="80" height="430" rx="12" ry="12" fill="url(#barGrad3)" filter="url(#barGlow)" clip-path="url(#roundedClip)"/>

  <!-- Bar 4: x=592, height=280, top y=440 -->
  <rect x="592" y="440" width="80" height="280" rx="12" ry="12" fill="url(#barGrad4)" filter="url(#barGlow)" clip-path="url(#roundedClip)"/>

  <!-- Bar 5 (rightmost): x=712, height=180, top y=540 -->
  <rect x="712" y="540" width="80" height="180" rx="12" ry="12" fill="url(#barGrad5)" filter="url(#barGlow)" clip-path="url(#roundedClip)"/>

  <!-- Baseline -->
  <line x1="212" y1="720" x2="812" y2="720" stroke="#D97706" stroke-width="4" stroke-linecap="round" opacity="0.5" clip-path="url(#roundedClip)"/>

  <!-- Claude-inspired asterisk/sparkle above the tallest bar (bar3 centered at x=512, top at y=290) -->
  <!-- Positioned at (512, 220) -->
  <g transform="translate(512, 215)" filter="url(#sparkleGlow)" clip-path="url(#roundedClip)">
    <!-- 6-ray asterisk, each ray length=40, stroke-width=10 -->
    <g stroke="#FCD34D" stroke-width="10" stroke-linecap="round" opacity="0.95">
      <!-- 0° / 180° -->
      <line x1="-42" y1="0" x2="42" y2="0"/>
      <!-- 60° / 240° -->
      <line x1="-21" y1="-36.4" x2="21" y2="36.4"/>
      <!-- 120° / 300° -->
      <line x1="21" y1="-36.4" x2="-21" y2="36.4"/>
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#FCD34D" opacity="0.95"/>
  </g>

  <!-- Extra glow layer for sparkle (larger, softer) -->
  <g transform="translate(512, 215)" clip-path="url(#roundedClip)" opacity="0.25">
    <circle cx="0" cy="0" r="60" fill="#F59E0B"/>
  </g>

</svg>
